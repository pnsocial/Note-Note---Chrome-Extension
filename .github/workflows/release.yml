# On push of tag v<version> matching manifest.json "version", create GitHub Release + Chrome-installable ZIP.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify tag matches manifest.json
        id: meta
        run: |
          set -euo pipefail
          M=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" != "v${M}" ]]; then
            echo "::error::Tag must be v + manifest.json \"version\". manifest=$M tag=$TAG (e.g. git tag v${M})"
            exit 1
          fi
          echo "manifest_version=${M}" >> "$GITHUB_OUTPUT"
          echo "zip_name=daily-markdown-note-${M}.zip" >> "$GITHUB_OUTPUT"

      - name: Package extension (ZIP)
        run: |
          set -euo pipefail
          mkdir -p dist
          zip -r "dist/${{ steps.meta.outputs.zip_name }}" \
            manifest.json \
            newtab.html \
            css \
            js \
            icons

      - name: Create GitHub Release with ZIP asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          ZIP="dist/${{ steps.meta.outputs.zip_name }}"
          cat > release_notes.md << EOF
          ## Install on Chrome

          1. Under **Assets** below, download \`${{ steps.meta.outputs.zip_name }}\`.
          2. Unzip — the top-level folder must contain \`manifest.json\`.
          3. Open \`chrome://extensions\` → enable **Developer mode** → **Load unpacked** → select the unzipped folder.

          Version: **${{ steps.meta.outputs.manifest_version }}** (tag \`${TAG}\`).
          EOF
          gh release create "$TAG" "$ZIP" \
            --title "Daily Markdown Note ${TAG}" \
            --notes-file release_notes.md

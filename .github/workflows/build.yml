# Kiểm tra manifest + đóng gói ZIP extension (artifact trên GitHub Actions).
name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate manifest.json
        run: python3 -m json.tool manifest.json > /dev/null

      - name: Package extension
        run: |
          mkdir -p dist
          zip -r "dist/daily-markdown-note.zip" \
            manifest.json \
            newtab.html \
            css \
            js \
            icons

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v5
        with:
          name: extension-zip
          path: dist/daily-markdown-note.zip

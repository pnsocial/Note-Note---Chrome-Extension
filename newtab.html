<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Note</title>
    <script src="js/theme-boot.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-top">
          <h1 class="title">Daily Markdown Note</h1>
          <div class="header-actions" role="toolbar" aria-label="Toolbar">
            <button
              type="button"
              class="toolbar-btn toolbar-btn--icon"
              id="btn-export-all-zip"
              title="Download all notes (.md) as one ZIP file"
              aria-label="Download all Markdown notes as a ZIP file"
            >
              <svg
                class="toolbar-btn__icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path
                  d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
                />
                <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
                <line x1="12" y1="22.08" x2="12" y2="12" />
              </svg>
            </button>
            <button
              type="button"
              class="toolbar-btn toolbar-btn--icon"
              id="btn-calendar-toggle"
              aria-expanded="false"
              aria-controls="calendar-popover"
              aria-haspopup="dialog"
              title="Month calendar — click a day to scroll to that note"
              aria-label="Open month calendar"
            >
              <svg
                class="toolbar-btn__icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                <line x1="16" y1="2" x2="16" y2="6" />
                <line x1="8" y1="2" x2="8" y2="6" />
                <line x1="3" y1="10" x2="21" y2="10" />
              </svg>
            </button>
            <button
              type="button"
              class="toolbar-btn toolbar-btn--icon"
              id="btn-search-toggle"
              aria-expanded="false"
              aria-controls="header-search-row"
              title="Search notes"
              aria-label="Search notes"
            >
              <svg
                class="toolbar-btn__icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
              </svg>
            </button>
            <button
              type="button"
              class="toolbar-btn toolbar-btn--icon"
              id="btn-theme-toggle"
              aria-pressed="false"
              title="Switch to dark theme"
              aria-label="Switch to dark theme"
            >
              <svg
                class="toolbar-btn__icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
            </button>
            <button
              type="button"
              class="toolbar-btn toolbar-btn--icon toolbar-btn--primary"
              id="btn-history-toggle"
              aria-expanded="true"
              aria-controls="history-body"
              disabled
              title="Collapse history"
              aria-label="Collapse history"
            >
              <svg
                class="toolbar-btn__icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="m18 15-6-6-6 6" />
              </svg>
            </button>
          </div>
        </div>
        <p class="meta" id="meta-line" aria-live="polite"></p>
        <div class="header-search-row" id="header-search-row" hidden>
          <div class="note-search-wrap">
            <label for="note-search" class="visually-hidden"
              >Search notes by date or content</label
            >
            <input
              type="search"
              id="note-search"
              class="note-search-input"
              placeholder="Search by date or content…"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
        </div>
        <p class="search-hint" id="search-hint" hidden aria-live="polite"></p>
      </header>

      <section
        class="today-section"
        id="today-section"
        aria-labelledby="today-heading"
      >
        <div class="today-heading-row">
          <h2 id="today-heading" class="section-heading today-heading"></h2>
          <div
            class="today-heading-row__actions"
            role="group"
            aria-label="Today’s stats and export"
          >
            <div
              class="word-stats"
              id="word-stats"
              aria-live="polite"
              title="Today’s note (plain Markdown)"
            >
              <span class="word-stats__line">
                <strong id="word-stats-count">0</strong> words
              </span>
              <span class="word-stats__line word-stats__muted">
                ~<strong id="word-stats-read">0</strong> min read
              </span>
            </div>
            <button
              type="button"
              class="note-export-btn note-export-btn--icon"
              id="btn-export-today"
              title="Download today’s note as YYYY-MM-DD.md"
              aria-label="Export today’s note as Markdown"
            >
              <svg
                class="note-export-btn__icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
            </button>
          </div>
        </div>
        <div id="today-editor-shell" class="today-editor-shell">
          <div id="today-editor-chrome" class="today-editor-chrome">
            <div
              id="format-toolbar"
              class="format-toolbar"
              role="toolbar"
              aria-label="Quick formatting"
            ></div>
            <hr class="today-editor-rule" />
          </div>
          <label for="today-editor" class="visually-hidden"
            >Today’s Markdown note</label
          >
          <textarea
            id="today-editor"
            class="today-editor"
            spellcheck="true"
            rows="16"
            placeholder="Type Markdown; click outside the editor to see the preview — click the preview to edit again."
          ></textarea>
          <div
            id="today-rendered"
            class="markdown-body today-rendered"
            hidden
            tabindex="0"
            role="document"
            aria-label="Today’s note (rendered). Click to edit Markdown source."
          ></div>
        </div>
      </section>

      <section
        id="history-panel"
        class="history-panel"
        aria-labelledby="history-heading"
        hidden
      >
        <div id="history-body" class="history-body">
          <h2 id="history-heading" class="section-heading history-heading">
            History (read-only)
          </h2>
          <p class="hint">
            Past days are view and copy only — no editing (don’t rewrite the past).
          </p>
          <div id="legacy-entries" class="legacy-entries"></div>
        </div>
      </section>
    </div>

    <div
      id="calendar-popover"
      class="calendar-popover"
      hidden
      role="dialog"
      aria-label="Month calendar"
    >
      <div id="mini-calendar-root" class="mini-calendar-root"></div>
    </div>

    <script src="js/purify.min.js"></script>
    <script src="js/marked.min.js"></script>
    <script type="module" src="js/editor.js"></script>
  </body>
</html>
